name: E2E Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: "E2E WorkFlow"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # STAGE 1: Up all stack
      # --------------------------------------------------------
      - name: Start full stack
        run: |
          # docker compose -f docker-compose.monitoring.yml up -d --build
          docker compose -f docker-compose.monitoring.yml up -d postgres redis elasticsearch kafka zookeeper cassandra
        timeout-minutes: 5

      # Any service have your health check.
      - name: Wait for infrastructure (Kafka, Redis, Cassandra, ES, Postgres)
        run: |
          echo "Waiting for infrastructure to be ready..."

          # PostgreSQL
          for i in $(seq 1 30); do
            if docker exec $(docker ps -qf "name=postgres") pg_isready -U postgres > /dev/null 2>&1; then
              echo "PostgreSQL ready"
              break
            fi
            [ $i -eq 30 ] && echo "PostgreSQL timeout" && exit 1
            sleep 3
          done

          # Redis
          for i in $(seq 1 20); do
            if docker exec $(docker ps -qf "name=redis") redis-cli ping | grep -q PONG; then
              echo "Redis ready"
              break
            fi
            [ $i -eq 20 ] && echo "Redis timeout" && exit 1
            sleep 3
          done

          # Elasticsearch
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'; then
              echo "Elasticsearch ready"
              break
            fi
            [ $i -eq 30 ] && echo "Elasticsearch timeout" && exit 1
            sleep 15
          done

          # Kafka
          for i in $(seq 1 30); do
            if docker exec kafka nc -z localhost 29092; then
              sleep 10
              echo "Kafka ready"
              break
            fi
            
            if [ $i -eq 30 ]; then
              docker logs kafka | tail -n 20
              exit 1
            fi
            sleep 10
          done
          
          # Cassandra
          for i in $(seq 1 20); do
            if docker exec $(docker ps -qf "name=cassandra") \
              cqlsh -e "DESCRIBE KEYSPACES" > /dev/null 2>&1; then
              echo "Cassandra cqlsh ready"
              break
            fi
            [ $i -eq 20 ] && echo "Cassandra not ready" && exit 1
            sleep 5
          done

          echo "All infrastructure is ready"

      # --------------------------------------------------------
      # STAGE 2: Database Schema Initialization
      # --------------------------------------------------------
      - name: Initialize PostgreSQL schema
        run: |
          docker exec -i $(docker ps -qf "name=postgres") \
            psql -U postgres -d postgres < database/schema_changes.sql
          echo "PostgreSQL schema initialized"

      - name: Initialize Cassandra schema
        run: |
          docker exec -i $(docker ps -qf "name=cassandra") \
            cqlsh < backend1/schema_cassandra.sql
          echo "Cassandra schema initialized"

      # --------------------------------------------------------
      # STAGE 3: Start and Wait Microservices
      # --------------------------------------------------------
      - name: Wait for microservices (Gateway + 3 backends)
        run: |
          docker compose -f docker-compose.monitoring.yml up -d --build gateway cart-service product-service order-service
          
          declare -A services=(
            ["Gateway"]="8080/metrics"
            ["Cart Service"]="8081/api/cart/items/7f7703a6-7847-4610-9104-2a902287e857"

            ["Order Service"]="8083/orders/7f7703a6-7847-4610-9104-2a902287e857/pay"     
          )

          for name in "${!services[@]}"; do
            endpoint="${services[$name]}"
            echo "Waiting for $name at $endpoint..."
            
            for i in $(seq 1 20); do
              if [[ "$name" == "Order Service" ]]; then
                if curl -s -o /dev/null -w "%{http_code}" "http://localhost:$endpoint" | grep -q "405\|200\|404"; then
                  echo "$name is UP (responded)!"
                  break
                fi
              else
                if curl -sf -H "X-API-KEY: abc-123" "http://localhost:$endpoint" > /dev/null 2>&1; then
                  echo "$name is UP!"
                  break
                fi
              fi
              
              if [ $i -eq 20 ]; then
                echo "$name TIMEOUT!"
                docker compose -f docker-compose.monitoring.yml logs
                exit 1
              fi
              echo "Retrying $name... ($i/20)"
              sleep 5
            done
          done

      # --------------------------------------------------------
      # STAGE 4: E2E Business Flow Tests
      # --------------------------------------------------------
      # STEP 1: Create Product
      - name: "E2E Step 1/6 — Create Product"
        id: create_product
        run: |
          echo "Creating product..."

          response=$(curl -sf -w "\n%{http_code}" \
            -X POST http://localhost:8080/products \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: abc-123" \
            -d '{
              "name": "Laptop",
              "price": 1200.00,
              "description": "High performance laptop MacookPro"
            }')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Response body: $body"
          echo "HTTP Status: $http_code"

          if [[ "$http_code" != "200" && "$http_code" != "201" ]]; then
            echo "Create product failed — expected 200/201, got $http_code"
            exit 1
          fi

          # Εξάγει το product ID από το response για τα επόμενα steps
          PRODUCT_ID=$(echo "$body" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$PRODUCT_ID" ]; then
            # Fallback: χρησιμοποίησε το γνωστό UUID από το README
            PRODUCT_ID="a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            echo "Could not extract product ID, using default: $PRODUCT_ID"
          fi

          echo "Product created — ID: $PRODUCT_ID"
          echo "PRODUCT_ID=$PRODUCT_ID" >> $GITHUB_ENV

      # STEP 2: Set Inventory for the product
      - name: "E2E Step 2/6 — Set Inventory"
        run: |
          echo "Setting inventory for product $PRODUCT_ID..."

          response=$(curl -sf -w "\n%{http_code}" \
            -X POST http://localhost:8080/api/inventory \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: abc-123" \
            -d "{
              \"productId\": \"$PRODUCT_ID\",
              \"stock\": 100
            }")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [[ "$http_code" != "200" && "$http_code" != "201" ]]; then
            echo "Set inventory failed — expected 200/201, got $http_code"
            exit 1
          fi

          echo "Inventory set to 100 units"

      # STEP 3: Add to Cart
      - name: "E2E Step 3/6 — Add to Cart"
        run: |
          CART_ID="7f7703a6-7847-4610-9104-2a902287e857"
          echo "Adding product $PRODUCT_ID to cart $CART_ID..."

          response=$(curl -sf -w "\n%{http_code}" \
            -X POST http://localhost:8080/api/cart/items \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: abc-123" \
            -d "{
              \"cartId\": \"$CART_ID\",
              \"productId\": \"$PRODUCT_ID\",
              \"quantity\": 2
            }")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [[ "$http_code" != "200" && "$http_code" != "201" ]]; then
            echo "Add to cart failed — expected 200/201, got $http_code"
            exit 1
          fi

          echo "Product added to cart"
          echo "CART_ID=$CART_ID" >> $GITHUB_ENV

      # STEP 4: Create Order from cart
      - name: "E2E Step 4/6 — Create Order"
        run: |
          CART_ID="7f7703a6-7847-4610-9104-2a902287e857"
          echo "Creating order from cart $CART_ID..."

          response=$(curl -s -w "\n%{http_code}" \
            -X POST "http://localhost:8080/api/orders/create/$CART_ID" \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: abc-123" \ 
            -d "{
              \"cartId\": \"$CART_ID\",
              \"productId\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\",
              \"quantity\": 2
            }")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [[ "$http_code" != "200" && "$http_code" != "201" ]]; then
            echo "Create order failed — expected 200/201, got $http_code"
            exit 1
          fi

          ORDER_ID=$(echo "$body" | python3 -c "import sys, json; print(json.load(sys.stdin).get('order_id', ''))")
          STATUS=$(echo "$body" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$ORDER_ID" ]; then
            echo "Could not extract order_id from response!"
            exit 1
          fi
  
          echo "Order created — ID: $ORDER_ID"
          echo "ORDER_ID=$ORDER_ID" >> $GITHUB_ENV
          echo "CART_ID=$CART_ID" >> $GITHUB_ENV

      # STEP 5: Payment
      - name: "E2E Step 5/6 — Process Payment"
        run: |
          echo "Processing payment for order $ORDER_ID..."

          response=$(curl -s -w "\n%{http_code}" \
            -X POST "http://localhost:8080/orders/$CART_ID/pay" \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: abc-123" \
            -d "{
              \"orderId\": \"$ORDER_ID\",
              \"userId\": \"dd376484-ae89-4f65-94b7-c0e06f156ab1\",
              \"amount\": 2400.00,
              \"paymentMethod\": \"credit_card\"
            }")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [[ "$http_code" != "200" && "$http_code" != "201" ]]; then
            echo "Payment failed with status $http_code"
            exit 1
          fi

          echo "Payment processed successfully"

      # STEP 6: Search Product (gRPC path)
      # gRPC path: Gateway → backend2 → Elasticsearch
      - name: "E2E Step 6/6 — Search Product via gRPC"
        run: |
          echo "Searching for 'Laptop' via gRPC/Elasticsearch..."

          # Δίνει λίγο χρόνο για Kafka sync (product → Elasticsearch)
          echo " Waiting for Kafka to sync product to Elasticsearch..."
          sleep 10

          response=$(curl -sf -w "\n%{http_code}" \
            -X GET "http://localhost:8080/product/products/v2?search=Laptop" \
            -H "X-API-KEY: abc-123")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [[ "$http_code" != "200" ]]; then
            echo "Search failed — expected 200, got $http_code"
            exit 1
          fi

          if echo "$body" | grep -qi "laptop"; then
            echo "Search returned correct results"
          else
            echo "Search returned 200 but 'Laptop' not found in results"
            echo "    This might be OK if Kafka sync is still in progress"
          fi

      # --------------------------------------------------------
      # STAGE 5: Inventory Verification
      # --------------------------------------------------------
      - name: "E2E Verify — Inventory updated after order"
        run: |
          echo "Verifying inventory was decremented by Kafka worker..."

          sleep 10

          response=$(curl -sf -w "\n%{http_code}" \
            -X GET "http://localhost:8080/api/inventory/$PRODUCT_ID" \
            -H "X-API-KEY: abc-123")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)

          echo "Inventory response: $body"

          if [[ "$http_code" == "200" ]]; then
            stock=$(echo "$body" | grep -o '"stock":[0-9]*' | cut -d':' -f2)
            echo "Current stock: $stock (was 100, ordered 2)"
            if [ -n "$stock" ] && [ "$stock" -lt 100 ]; then
              echo "Inventory correctly decremented to $stock"
            else
              echo "Stock is $stock — Kafka worker may still be processing"
            fi
          else
            echo "Inventory endpoint returned $http_code — skipping verification"
          fi

      # --------------------------------------------------------
      # STAGE 6: Gateway Health Checks
      # --------------------------------------------------------
      - name: "Gateway — Verify rate limiter returns 429"
        run: |
          echo "Testing rate limiter..."
          RATE_LIMITED=0

          for i in $(seq 1 100); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "X-API-KEY: abc-123" \
              http://localhost:8080/metrics)
            if [ "$code" = "429" ]; then
              RATE_LIMITED=$((RATE_LIMITED + 1))
            fi
          done

          echo "Rate limited: $RATE_LIMITED/100 requests"
          if [ "$RATE_LIMITED" -gt 0 ]; then
            echo "Rate limiter is active"
          else
            echo "No rate limiting detected — check config.yaml rate_limit_rps setting"
          fi

      - name: "Gateway — Verify auth rejects missing API key"
        run: |
          echo "Testing authentication..."

          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET http://localhost:8080/products)

          echo "Response without API key: HTTP $code"

          if [ "$code" = "401" ]; then
            echo "Auth middleware correctly rejects unauthenticated requests"
          else
            echo "Expected 401, got $code — auth middleware may not be configured"
            exit 1
          fi

      - name: "Gateway — Verify Correlation ID is propagated"
        run: |
          echo "Testing Correlation ID propagation..."

          CUSTOM_ID="test-correlation-$(date +%s)"
          response_headers=$(curl -sf -D - -o /dev/null \
            -H "X-API-KEY: abc-123" \
            -H "X-Correlation-Id: $CUSTOM_ID" \
            http://localhost:8080/metrics)

          if echo "$response_headers" | grep -qi "x-correlation-id: $CUSTOM_ID"; then
            echo "Correlation ID correctly propagated in response headers"
          else
            echo "Correlation ID not found in response headers"
            echo "Headers received:"
            echo "$response_headers"
          fi

      # --------------------------------------------------------
      # STAGE 7: Prometheus Metrics Check
      # --------------------------------------------------------
      - name: "Observability — Verify Prometheus metrics"
        run: |
          echo "Checking Prometheus metrics..."

          metrics=$(curl -sf \
            -H "X-API-KEY: abc-123" \
            http://localhost:8080/metrics)

          checks=(
            "http_requests_counter"
            "http_request_timer"
            "gateway_circuit_breaker_state"
            "gateway_rate_limited_total"
          )

          all_ok=true
          for metric in "${checks[@]}"; do
            if echo "$metrics" | grep -q "$metric"; then
              echo "$metric — present"
            else
              echo "$metric — MISSING"
              all_ok=false
            fi
          done

          if [ "$all_ok" = false ]; then
            echo "Some Prometheus metrics are missing"
            exit 1
          fi

          echo "All Prometheus metrics are present"


      - name: Print logs on failure
        if: failure()
        run: |
          echo "========== GATEWAY LOGS =========="
          docker compose -f docker-compose.monitoring.yml logs --tail=100 gateway || true
          echo "========== BACKEND1 (Cart) LOGS =========="
          docker compose -f docker-compose.monitoring.yml logs --tail=100 backend1 || true
          echo "========== BACKEND2 (Product) LOGS =========="
          docker compose -f docker-compose.monitoring.yml logs --tail=100 backend2 || true
          echo "========== BACKEND3 (Order) LOGS =========="
          docker compose -f docker-compose.monitoring.yml logs --tail=100 backend3 || true
          echo "========== KAFKA LOGS =========="
          docker compose -f docker-compose.monitoring.yml logs --tail=50 kafka || true

      - name: Generate E2E Summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Endpoint | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | POST /products | Create product |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | POST /api/inventory | Set stock |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | POST /api/cart/items | Add to cart |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | POST /api/orders/create/:cartId | Create order |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | POST /orders/:cartId/pay | Process payment |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | GET /product/products/v2 | Search via gRPC |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Product ID used:** \`$PRODUCT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "**Cart ID used:** \`$CART_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "**Order ID created:** \`$ORDER_ID\`" >> $GITHUB_STEP_SUMMARY

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.monitoring.yml down -v --remove-orphans