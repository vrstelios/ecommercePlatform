port: ":8080"

middleware_config:
  auth_apikey:
    valid_keys:
      - "abc-123"
      - "dwe-659"

services:
  - name: "cart-inventory-service"
    route_pattern: "/api"
    urls:
      - "http://cart-service:8081"
    middleware:
      - "rate_limit"
      - "auth_apikey"
      - "metrics"
    rate_limit_rps: 2
    rate_limit_burst: 3

  - name: "product-service"
    route_pattern: "/product"
    urls:
      - "http://product-service:8082"
    middleware:
      - "rate_limit"
      - "auth_apikey"
      - "metrics"
    rate_limit_rps: 2
    rate_limit_burst: 3

  - name: "order-service"
    route_pattern: "/order"
    urls:
      - "http://order-service:8083"
    middleware:
      - "rate_limit"
      - "auth_apikey"
      - "metrics"
    rate_limit_rps: 2
    rate_limit_burst: 3