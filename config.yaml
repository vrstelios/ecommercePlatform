port: ":8080"

middleware_config:
  auth_apikey:
    valid_keys:
      - "abc-123"
      - "dwe-659"

services:
  - name: "user-service"
    route_pattern: "/users"
    urls:
      - "http://localhost:8081"
      - "http://localhost:8083"
    middleware:
      - "rate_limit"
      - "metrics"
    rate_limit_rps: 2
    rate_limit_burst: 3

  - name: "product-service"
    route_pattern: "/product"
    urls:
      - "http://localhost:8082"
    middleware:
      - "rate_limit"
      - "metrics"
    rate_limit_rps: 2
    rate_limit_burst: 3